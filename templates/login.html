<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="navbar">
        Student Login
    </div>

    <div class="container">

        <form method="POST">

            <h1>Login</h1>

            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>

            <br><br>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <br><br>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
